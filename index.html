<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Palpites da Copa do Mundo FIFA 2026 — preveja todos os resultados e compare com seus amigos."
    />
    <title>Copa 2026 — Palpites</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <link
      rel="icon"
      href="icons/favicon-32.png"
      sizes="32x32"
      type="image/png"
    />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Copa 2026" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the saved theme before first paint so there's no flash of the default.
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ============================================================
       Login view
       ============================================================ -->
    <div id="view-loading" aria-label="Carregando">
      <div class="loading-spinner"></div>
    </div>

    <div id="view-login" class="hidden">
      <div class="login-card">
        <span class="login-logo" aria-hidden="true">⚽</span>
        <h1 class="login-title">Copa 2026</h1>
        <p class="login-subtitle" data-i18n="login.subtitle">
          Faça seus palpites para a Copa do Mundo FIFA 2026 e compete com seus
          amigos.
        </p>
        <button id="btn-login" class="btn-google" type="button">
          <!-- Google "G" icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="#fff"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#fff"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#fff"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            />
            <path
              fill="#fff"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span data-i18n="login.google">Entrar com Google</span>
        </button>

        <div class="login-divider">
          <span data-i18n="login.divider">ou com e-mail</span>
        </div>

        <form id="email-form" class="email-form" novalidate>
          <input
            id="login-name"
            class="login-input"
            type="text"
            autocomplete="name"
            placeholder="Seu nome"
            aria-label="Seu nome"
            data-i18n-ph="login.name"
            data-i18n-aria="login.name"
          />
          <input
            id="login-email"
            class="login-input"
            type="email"
            autocomplete="email"
            placeholder="E-mail"
            aria-label="E-mail"
            required
            data-i18n-ph="login.email"
            data-i18n-aria="login.email"
          />
          <input
            id="login-password"
            class="login-input"
            type="password"
            autocomplete="current-password"
            placeholder="Senha (mín. 6 caracteres)"
            aria-label="Senha"
            data-i18n-ph="login.password"
            data-i18n-aria="login.password"
          />
          <button
            id="btn-email"
            class="btn-email"
            type="submit"
            data-i18n="login.submit"
          >
            Entrar / Criar conta
          </button>
          <button
            id="btn-magic"
            class="btn-magic"
            type="button"
            data-i18n="login.magic"
          >
            Receber link de acesso por e-mail
          </button>
        </form>

        <button
          id="btn-guest"
          class="btn-guest"
          type="button"
          data-i18n="login.guest"
        >
          Entrar como convidado
        </button>

        <div
          class="lang-picker"
          role="group"
          aria-label="Idioma"
          data-i18n-aria="header.lang"
        >
          <button class="lang-btn" type="button" data-lang="pt">PT</button>
          <button class="lang-btn" type="button" data-lang="en">EN</button>
        </div>

        <div
          class="theme-picker"
          role="group"
          aria-label="Escolher tema"
          data-i18n-aria="header.theme"
        >
          <button
            class="theme-swatch"
            type="button"
            data-theme-value="classico"
            title="Clássico"
            aria-label="Tema Clássico"
            style="--sw1: #0d1117; --sw2: #58a6ff"
          ></button>
          <button
            class="theme-swatch"
            type="button"
            data-theme-value="copa"
            title="Verde & Ouro"
            aria-label="Tema Verde e Ouro"
            style="--sw1: #2ea043; --sw2: #e3b341"
          ></button>
          <button
            class="theme-swatch"
            type="button"
            data-theme-value="sunset"
            title="Pôr do Sol"
            aria-label="Tema Pôr do Sol"
            style="--sw1: #5a1f5e; --sw2: #ff9e57"
          ></button>
          <button
            class="theme-swatch"
            type="button"
            data-theme-value="neon"
            title="Roxo Neon"
            aria-label="Tema Roxo Neon"
            style="--sw1: #22d3ee; --sw2: #c084fc"
          ></button>
          <button
            class="theme-swatch"
            type="button"
            data-theme-value="claro"
            title="Clean Claro"
            aria-label="Tema Clean Claro"
            style="--sw1: #ffffff; --sw2: #2f6feb"
          ></button>
        </div>

        <p id="login-msg" class="login-msg" role="alert" aria-live="polite"></p>
      </div>
    </div>

    <!-- ============================================================
       App view (post-login)
       ============================================================ -->
    <div id="view-app" class="hidden" aria-live="polite">
      <header role="banner">
        <span class="header-logo" aria-label="Copa 2026">
          <span class="logo-badge" aria-hidden="true">⚽</span>
          <span class="logo-word">Copa<b>26</b></span>
        </span>

        <nav class="nav-tabs" role="navigation" aria-label="Seções principais">
          <button class="nav-tab" data-view="fixtures" type="button">
            <span class="nav-icon" aria-hidden="true">📅</span>
            <span class="nav-label" data-i18n="nav.fixtures">Jogos</span>
          </button>
          <button class="nav-tab active" data-view="groups" type="button">
            <span class="nav-icon" aria-hidden="true">📊</span>
            <span class="nav-label" data-i18n="nav.groups">Grupos</span>
          </button>
          <button class="nav-tab" data-view="knockout" type="button">
            <span class="nav-icon" aria-hidden="true">⚔️</span>
            <span class="nav-label" data-i18n="nav.knockout">Mata-Mata</span>
          </button>
          <button class="nav-tab" data-view="ranking" type="button">
            <span class="nav-icon" aria-hidden="true">🏆</span>
            <span class="nav-label" data-i18n="nav.ranking">Ranking</span>
          </button>
          <button class="nav-tab" data-view="leagues" type="button">
            <span class="nav-icon" aria-hidden="true">🛡️</span>
            <span class="nav-label" data-i18n="nav.leagues">Ligas</span>
          </button>
          <button
            class="nav-tab nav-tab-admin hidden"
            data-view="admin"
            type="button"
          >
            <span class="nav-icon" aria-hidden="true">🛠️</span>
            <span class="nav-label" data-i18n="nav.admin">Admin</span>
          </button>
        </nav>

        <div class="header-user">
          <div id="user-info" aria-live="polite"></div>
          <div class="theme-picker" role="group" aria-label="Escolher tema">
            <button
              class="theme-swatch"
              type="button"
              data-theme-value="classico"
              title="Clássico"
              aria-label="Tema Clássico"
              style="--sw1: #0d1117; --sw2: #58a6ff"
            ></button>
            <button
              class="theme-swatch"
              type="button"
              data-theme-value="copa"
              title="Verde & Ouro"
              aria-label="Tema Verde e Ouro"
              style="--sw1: #2ea043; --sw2: #e3b341"
            ></button>
            <button
              class="theme-swatch"
              type="button"
              data-theme-value="sunset"
              title="Pôr do Sol"
              aria-label="Tema Pôr do Sol"
              style="--sw1: #5a1f5e; --sw2: #ff9e57"
            ></button>
            <button
              class="theme-swatch"
              type="button"
              data-theme-value="neon"
              title="Roxo Neon"
              aria-label="Tema Roxo Neon"
              style="--sw1: #22d3ee; --sw2: #c084fc"
            ></button>
            <button
              class="theme-swatch"
              type="button"
              data-theme-value="claro"
              title="Clean Claro"
              aria-label="Tema Clean Claro"
              style="--sw1: #ffffff; --sw2: #2f6feb"
            ></button>
          </div>
          <div
            class="lang-picker"
            role="group"
            aria-label="Idioma"
            data-i18n-aria="header.lang"
          >
            <button class="lang-btn" type="button" data-lang="pt">PT</button>
            <button class="lang-btn" type="button" data-lang="en">EN</button>
          </div>
          <button
            id="btn-logout"
            class="btn-logout"
            type="button"
            aria-label="Sair da conta"
            data-i18n="header.logout"
          >
            Sair
          </button>
        </div>
      </header>

      <main role="main" aria-label="Conteúdo principal">
        <!-- Completion progress (rendered by app.js) -->
        <div
          id="progress-tracker"
          class="progress-tracker hidden"
          aria-live="polite"
        ></div>

        <!-- Fixtures (chronological) view -->
        <section id="view-fixtures" class="hidden" aria-label="Próximos jogos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Groups view -->
        <section id="view-groups" aria-label="Fase de grupos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Knockout view -->
        <section
          id="view-knockout"
          class="hidden"
          aria-label="Fase eliminatória"
        >
          <!-- Rendered by app.js -->
        </section>

        <!-- Ranking view -->
        <section id="view-ranking" class="hidden" aria-label="Ranking">
          <!-- Rendered by app.js -->
        </section>

        <!-- Leagues view -->
        <section id="view-leagues" class="hidden" aria-label="Ligas">
          <!-- Rendered by app.js -->
        </section>

        <!-- Admin dashboard (rendered by app.js, gated to admin uids) -->
        <section id="view-admin" class="hidden" aria-label="Painel de admin">
          <!-- Rendered by app.js -->
        </section>
      </main>

      <!-- Comparison modal (opened from a ranking card; rendered by app.js) -->
      <div
        id="cmp-modal"
        class="cmp-modal hidden"
        role="dialog"
        aria-modal="true"
        aria-label="Comparação de palpites"
      >
        <div class="cmp-modal-backdrop"></div>
        <div class="cmp-modal-body"><!-- Rendered by app.js --></div>
      </div>
    </div>

    <!-- "New version available" prompt (shown by app.js when the SW updates) -->
    <div id="update-toast" class="update-toast hidden" role="alert"></div>

    <script type="module" src="js/app.js"></script>
    <script>
      const __E2E__ = new URLSearchParams(location.search).has("e2e");
      if ("serviceWorker" in navigator && !__E2E__) {
        let refreshing = false;
        // The new SW took control (after we told it to SKIP_WAITING) — reload once
        // so the page runs the fresh code.
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener("load", async () => {
          let reg;
          try {
            reg = await navigator.serviceWorker.register("sw.js");
          } catch {
            return;
          }

          // Tell app.js a new version is waiting; it renders the update prompt.
          const notify = (worker) => {
            window.__swWaiting = worker;
            window.dispatchEvent(
              new CustomEvent("sw-waiting", { detail: worker }),
            );
          };

          // A SW was already waiting when the page loaded.
          if (reg.waiting && navigator.serviceWorker.controller)
            notify(reg.waiting);

          // A new SW started installing — wait for it to be ready.
          reg.addEventListener("updatefound", () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener("statechange", () => {
              if (
                installing.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                notify(installing);
              }
            });
          });

          // Check for a new deploy periodically and when the app regains focus, so
          // the prompt can appear without a manual close/reopen.
          setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible")
              reg.update().catch(() => {});
          });
        });
      }
    </script>
  </body>
</html>
