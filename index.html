<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Palpites da Copa do Mundo FIFA 2026 — preveja todos os resultados e compare com seus amigos."
    />
    <title>Copa 2026 — Palpites</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0a0c0b" />
    <link
      rel="icon"
      href="icons/favicon-32.png"
      sizes="32x32"
      type="image/png"
    />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Copa 2026" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the saved theme before first paint so there's no flash of the default.
      // Only two themes now: dark (default, no attribute) and light. Legacy theme
      // names (classico/copa/sunset/neon/claro) collapse to dark.
      try {
        var t = localStorage.getItem("theme");
        if (t === "light") document.documentElement.dataset.theme = "light";
      } catch (e) {}
    </script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ============================================================
       Login view
       ============================================================ -->
    <div id="view-loading" aria-label="Carregando">
      <div class="loading-spinner"></div>
    </div>

    <div id="view-login" class="hidden">
      <div class="login-glow" aria-hidden="true"></div>

      <div class="login-hero">
        <span class="login-crest" aria-hidden="true">26</span>
        <h1 class="login-title">COPA <span>26</span></h1>
        <p class="login-subtitle" data-i18n="login.subtitle">
          O bolão da Copa do Mundo com a sua turma. 104 jogos, um só campeão.
        </p>
      </div>

      <div class="login-actions">
        <button id="btn-login" class="btn-google" type="button">
          <span class="g-badge" aria-hidden="true">G</span>
          <span data-i18n="login.google">Continuar com Google</span>
        </button>

        <form id="email-form" class="email-form" novalidate>
          <input
            id="login-name"
            class="login-input"
            type="text"
            autocomplete="name"
            placeholder="Seu nome"
            aria-label="Seu nome"
            data-i18n-ph="login.name"
            data-i18n-aria="login.name"
          />
          <input
            id="login-email"
            class="login-input"
            type="email"
            autocomplete="email"
            placeholder="E-mail"
            aria-label="E-mail"
            required
            data-i18n-ph="login.email"
            data-i18n-aria="login.email"
          />
          <input
            id="login-password"
            class="login-input"
            type="password"
            autocomplete="current-password"
            placeholder="Senha (mín. 6 caracteres)"
            aria-label="Senha"
            data-i18n-ph="login.password"
            data-i18n-aria="login.password"
          />
          <button
            id="btn-email"
            class="btn-email"
            type="submit"
            data-i18n="login.submit"
          >
            Entrar / Criar conta
          </button>
          <button
            id="btn-magic"
            class="btn-magic"
            type="button"
            data-i18n="login.magic"
          >
            Receber link de acesso por e-mail
          </button>
        </form>

        <div class="login-divider">
          <span data-i18n="login.divider">OU</span>
        </div>

        <button
          id="btn-guest"
          class="btn-guest"
          type="button"
          data-i18n="login.guest"
        >
          Entrar como convidado
        </button>

        <p class="login-legal" data-i18n="login.legal">
          Ao entrar, você concorda com os termos de uso
        </p>

        <div
          class="lang-picker login-lang"
          role="group"
          aria-label="Idioma"
          data-i18n-aria="header.lang"
        >
          <button class="lang-btn" type="button" data-lang="pt">PT</button>
          <button class="lang-btn" type="button" data-lang="en">EN</button>
        </div>

        <p id="login-msg" class="login-msg" role="alert" aria-live="polite"></p>
      </div>
    </div>

    <!-- ============================================================
       App view (post-login)
       ============================================================ -->
    <div id="view-app" class="hidden" aria-live="polite">
      <header role="banner">
        <span class="header-logo" aria-label="Copa 2026">
          <span class="logo-badge" aria-hidden="true">26</span>
          <span class="logo-word">
            <b class="logo-word-main"
              >COPA<span class="logo-word-26"> 26</span></b
            >
            <small class="logo-word-sub">BOLÃO · MUNDIAL</small>
          </span>
        </span>

        <div class="header-actions">
          <button
            id="btn-theme"
            class="theme-toggle"
            type="button"
            aria-label="Alternar tema claro/escuro"
          ></button>
          <div
            id="progress-chip"
            class="progress-chip hidden"
            aria-live="polite"
          ></div>
          <button
            id="btn-user"
            class="user-avatar-btn"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Conta"
          >
            <div id="user-info" aria-live="polite"></div>
          </button>
          <div
            id="user-menu"
            class="user-menu hidden"
            role="menu"
            aria-label="Conta"
          >
            <div class="user-menu-name" id="user-menu-name"></div>
            <div
              class="lang-picker"
              role="group"
              aria-label="Idioma"
              data-i18n-aria="header.lang"
            >
              <button class="lang-btn" type="button" data-lang="pt">PT</button>
              <button class="lang-btn" type="button" data-lang="en">EN</button>
            </div>
            <button
              id="btn-logout"
              class="btn-logout"
              type="button"
              aria-label="Sair da conta"
              data-i18n="header.logout"
            >
              Sair
            </button>
          </div>
        </div>
      </header>

      <main role="main" aria-label="Conteúdo principal">
        <!-- Completion progress (rendered by app.js) -->
        <div
          id="progress-tracker"
          class="progress-tracker hidden"
          aria-live="polite"
        ></div>

        <!-- Fixtures (chronological) view -->
        <section id="view-fixtures" class="hidden" aria-label="Próximos jogos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Groups view -->
        <section id="view-groups" aria-label="Fase de grupos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Knockout view -->
        <section
          id="view-knockout"
          class="hidden"
          aria-label="Fase eliminatória"
        >
          <!-- Rendered by app.js -->
        </section>

        <!-- Teams view -->
        <section id="view-teams" class="hidden" aria-label="Seleções">
          <!-- Rendered by app.js -->
        </section>

        <!-- Ranking view -->
        <section id="view-ranking" class="hidden" aria-label="Ranking">
          <!-- Rendered by app.js -->
        </section>

        <!-- Leagues view -->
        <section id="view-leagues" class="hidden" aria-label="Ligas">
          <!-- Rendered by app.js -->
        </section>

        <!-- Admin dashboard (rendered by app.js, gated to admin uids) -->
        <section id="view-admin" class="hidden" aria-label="Painel de admin">
          <!-- Rendered by app.js -->
        </section>
      </main>

      <!-- Bottom navigation (mobile-first; 5 core tabs + Seleções, Admin gated) -->
      <nav class="bottom-nav" role="navigation" aria-label="Seções principais">
        <button class="nav-tab" data-view="fixtures" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="4" width="18" height="18" rx="2.5" />
            <path d="M3 10h18M8 2v4M16 2v4" />
          </svg>
          <span class="nav-label" data-i18n="nav.fixtures">Jogos</span>
        </button>
        <button class="nav-tab active" data-view="groups" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="3" width="7" height="7" rx="1.5" />
            <rect x="14" y="3" width="7" height="7" rx="1.5" />
            <rect x="3" y="14" width="7" height="7" rx="1.5" />
            <rect x="14" y="14" width="7" height="7" rx="1.5" />
          </svg>
          <span class="nav-label" data-i18n="nav.groups">Grupos</span>
        </button>
        <button class="nav-tab" data-view="knockout" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M5 5h2a2 2 0 0 1 2 2v3a2 2 0 0 0 2 2M5 19h2a2 2 0 0 0 2-2v-3a2 2 0 0 1 2-2M11 12h5M16 12l-3-3M16 12l-3 3"
            />
          </svg>
          <span class="nav-label" data-i18n="nav.knockout">Mata-Mata</span>
        </button>
        <button class="nav-tab" data-view="teams" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M4 7l4-2 1.5 2a3 3 0 0 0 5 0L16 5l4 2-2 4-2-1v8H8v-8l-2 1z"
            />
          </svg>
          <span class="nav-label" data-i18n="nav.teams">Seleções</span>
        </button>
        <button class="nav-tab" data-view="ranking" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M6 9a6 6 0 0 0 12 0V4H6Z" />
            <path
              d="M6 6H3.5v1A2.5 2.5 0 0 0 6 9.5M18 6h2.5v1A2.5 2.5 0 0 1 18 9.5M9 21h6M12 15v6"
            />
          </svg>
          <span class="nav-label" data-i18n="nav.ranking">Ranking</span>
        </button>
        <button class="nav-tab" data-view="leagues" type="button">
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="9" cy="8" r="3" />
            <path d="M3 20c0-3.3 2.7-5.5 6-5.5" />
            <circle cx="17" cy="9" r="2.3" />
            <path d="M15.5 14.6c2.6.2 4.5 2.1 4.5 4.9" />
          </svg>
          <span class="nav-label" data-i18n="nav.leagues">Ligas</span>
        </button>
        <button
          class="nav-tab nav-tab-admin hidden"
          data-view="admin"
          type="button"
        >
          <span class="nav-ind" aria-hidden="true"></span>
          <svg
            class="nav-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
            <path
              d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1L14.5 2h-5l-.4 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.6h5l.4-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"
            />
          </svg>
          <span class="nav-label" data-i18n="nav.admin">Admin</span>
        </button>
      </nav>

      <!-- Comparison modal (opened from a ranking card; rendered by app.js) -->
      <div
        id="cmp-modal"
        class="cmp-modal hidden"
        role="dialog"
        aria-modal="true"
        aria-label="Comparação de palpites"
      >
        <div class="cmp-modal-backdrop"></div>
        <div class="cmp-modal-body"><!-- Rendered by app.js --></div>
      </div>
    </div>

    <!-- "New version available" prompt (shown by app.js when the SW updates) -->
    <div id="update-toast" class="update-toast hidden" role="alert"></div>

    <script type="module" src="js/app.js"></script>
    <script>
      const __E2E__ = new URLSearchParams(location.search).has("e2e");
      if ("serviceWorker" in navigator && !__E2E__) {
        let refreshing = false;
        // The new SW took control (after we told it to SKIP_WAITING) — reload once
        // so the page runs the fresh code.
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener("load", async () => {
          let reg;
          try {
            reg = await navigator.serviceWorker.register("sw.js");
          } catch {
            return;
          }

          // Tell app.js a new version is waiting; it renders the update prompt.
          const notify = (worker) => {
            window.__swWaiting = worker;
            window.dispatchEvent(
              new CustomEvent("sw-waiting", { detail: worker }),
            );
          };

          // A SW was already waiting when the page loaded.
          if (reg.waiting && navigator.serviceWorker.controller)
            notify(reg.waiting);

          // A new SW started installing — wait for it to be ready.
          reg.addEventListener("updatefound", () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener("statechange", () => {
              if (
                installing.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                notify(installing);
              }
            });
          });

          // Check for a new deploy periodically and when the app regains focus, so
          // the prompt can appear without a manual close/reopen.
          setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible")
              reg.update().catch(() => {});
          });
        });
      }
    </script>
  </body>
</html>
