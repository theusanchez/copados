<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Palpites da Copa do Mundo FIFA 2026 — preveja todos os resultados e compare com seus amigos."
    />
    <title>Copa 2026 — Palpites</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <link
      rel="icon"
      href="icons/favicon-32.png"
      sizes="32x32"
      type="image/png"
    />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Copa 2026" />

    <link rel="stylesheet" href="css/style.css?v=12" />
  </head>
  <body>
    <!-- ============================================================
       Login view
       ============================================================ -->
    <div id="view-loading" aria-label="Carregando">
      <div class="loading-spinner"></div>
    </div>

    <div id="view-login" class="hidden">
      <div class="login-card">
        <span class="login-logo" aria-hidden="true">⚽</span>
        <h1 class="login-title">Copa 2026</h1>
        <p class="login-subtitle">
          Faça seus palpites para a Copa do Mundo FIFA 2026 e compete com seus
          amigos.
        </p>
        <button id="btn-login" class="btn-google" type="button">
          <!-- Google "G" icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="#fff"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#fff"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#fff"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            />
            <path
              fill="#fff"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          Entrar com Google
        </button>
      </div>
    </div>

    <!-- ============================================================
       App view (post-login)
       ============================================================ -->
    <div id="view-app" class="hidden" aria-live="polite">
      <header role="banner">
        <span class="header-logo" aria-label="Copa 2026">⚽ Copa 2026</span>

        <nav class="nav-tabs" role="navigation" aria-label="Seções principais">
          <button class="nav-tab" data-view="fixtures" type="button">
            <span class="nav-icon" aria-hidden="true">📅</span>
            <span class="nav-label">Jogos</span>
          </button>
          <button class="nav-tab active" data-view="groups" type="button">
            <span class="nav-icon" aria-hidden="true">📊</span>
            <span class="nav-label">Grupos</span>
          </button>
          <button class="nav-tab" data-view="knockout" type="button">
            <span class="nav-icon" aria-hidden="true">⚔️</span>
            <span class="nav-label">Mata-Mata</span>
          </button>
          <button class="nav-tab" data-view="compare" type="button">
            <span class="nav-icon" aria-hidden="true">⚖️</span>
            <span class="nav-label">Comparar</span>
          </button>
          <button class="nav-tab" data-view="ranking" type="button">
            <span class="nav-icon" aria-hidden="true">🏆</span>
            <span class="nav-label">Ranking</span>
          </button>
          <button class="nav-tab" data-view="leagues" type="button">
            <span class="nav-icon" aria-hidden="true">🛡️</span>
            <span class="nav-label">Ligas</span>
          </button>
        </nav>

        <div class="header-user">
          <div id="user-info" aria-live="polite"></div>
          <button
            id="btn-logout"
            class="btn-logout"
            type="button"
            aria-label="Sair da conta"
          >
            Sair
          </button>
        </div>
      </header>

      <main role="main" aria-label="Conteúdo principal">
        <!-- Completion progress (rendered by app.js) -->
        <div
          id="progress-tracker"
          class="progress-tracker hidden"
          aria-live="polite"
        ></div>

        <!-- Fixtures (chronological) view -->
        <section id="view-fixtures" class="hidden" aria-label="Próximos jogos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Groups view -->
        <section id="view-groups" aria-label="Fase de grupos">
          <!-- Rendered by app.js -->
        </section>

        <!-- Knockout view -->
        <section
          id="view-knockout"
          class="hidden"
          aria-label="Fase eliminatória"
        >
          <!-- Rendered by app.js -->
        </section>

        <!-- Compare view -->
        <section
          id="view-compare"
          class="hidden"
          aria-label="Comparar palpites"
        >
          <!-- Rendered by app.js -->
        </section>

        <!-- Ranking view -->
        <section id="view-ranking" class="hidden" aria-label="Ranking">
          <!-- Rendered by app.js -->
        </section>

        <!-- Leagues view -->
        <section id="view-leagues" class="hidden" aria-label="Ligas">
          <!-- Rendered by app.js -->
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js?v=12"></script>
    <script>
      const __E2E__ = new URLSearchParams(location.search).has("e2e");
      if ("serviceWorker" in navigator && !__E2E__) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
