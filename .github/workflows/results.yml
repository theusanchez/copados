name: Ingest World Cup results

on:
  # Primary trigger: an external cron (e.g. cron-job.org) POSTs to the GitHub
  # `dispatches` API every 1-2 min. External dispatches are NOT throttled like
  # GitHub's own `schedule`, so this is what gives near-live ingestion.
  repository_dispatch:
    types: [ingest]
  # Backup only — GitHub throttles schedules heavily (often ~15-30 min in practice).
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: results-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/results/package-lock.json

      - name: Install dependencies
        working-directory: scripts/results
        run: npm ci

      - name: Ingest results into Firestore
        working-directory: scripts/results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run ingest
